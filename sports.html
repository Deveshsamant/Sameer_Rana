<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports - Digitalization Techniques</title>
    <style>
        /* Same CSS as finance.html */
        :root { --charcoal: #2B2B2B; --yellow: #FFD700; --dark-yellow: #CCB000; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }
        body { background-color: var(--charcoal); color: white; line-height: 1.6; }
        .header { text-align: center; padding: 4rem 2rem; background: linear-gradient(rgba(43,43,43,0.9),rgba(43,43,43,0.9)); margin-bottom: 2rem; }
        .header h1 { font-size: 2.5rem; color: var(--yellow); text-transform: uppercase; }
        .content { max-width: 1200px; margin: 0 auto; padding: 0 20px 3rem; }
        h2 { color: var(--yellow); font-size: 2rem; margin: 2rem 0; }
        ul { margin: 1rem 0 2rem 2rem; }
        li { margin-bottom: 0.8rem; }
        .back-btn { background: var(--yellow); color: var(--charcoal); padding: 12px 30px; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; transition: 0.3s; display: inline-block; text-decoration: none; }
        .back-btn:hover { background: var(--dark-yellow); transform: translateY(-2px); }
        footer { background: #1A1A1A; text-align: center; padding: 2rem; position: relative; margin-top: 3rem; }
        @media (max-width: 768px) { .header h1 { font-size: 2rem; } h2 { font-size: 1.5rem; } }
    </style>
</head>
<body>
    <header class="header">
        <h1>Digital Sports</h1>
    </header>

    <div class="content">
        <h2>Athlete Analytics</h2>
        <p>Wearable tech and AI are revolutionizing sports performance...</p>
        
        <h2>Technologies</h2>
        <ul>
            <li>Biometric tracking</li>
            <li>AI-powered performance analysis</li>
            <li>Virtual reality training</li>
            <li>Smart sports equipment</li>
        </ul>

        <a href="index.html" class="back-btn">Back to Main</a>
    </div>

    <footer>
        <p>© 2023 Digitalization Trends. All rights reserved.</p>
    </footer>
</body>
</html>
