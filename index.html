<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digitalization Techniques</title>
    <style>
        :root {
            --charcoal: #2B2B2B;
            --yellow: #FFD700;
            --dark-yellow: #CCB000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background-color: var(--charcoal);
            color: white;
            line-height: 1.6;
        }

        .header {
            text-align: center;
            padding: 4rem 2rem;
            background: linear-gradient(rgba(43, 43, 43, 0.9), rgba(43, 43, 43, 0.9));
        }

        .header h1 {
            font-size: 2.5rem;
            color: var(--yellow);
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        .content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px 3rem;
        }

        h2 {
            color: var(--yellow);
            font-size: 2rem;
            margin: 2rem 0;
        }

        ul {
            margin: 1rem 0 2rem 2rem;
        }

        li {
            margin-bottom: 0.8rem;
        }

        .back-btn {
            background: var(--yellow);
            color: var(--charcoal);
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            display: inline-block;
            text-decoration: none;
        }

        .back-btn:hover {
            background: var(--dark-yellow);
            transform: translateY(-2px);
        }

        footer {
            background: #1A1A1A;
            text-align: center;
            padding: 1.5rem;
            margin-top: 3rem;
        }

        .card-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .card {
            position: relative;
            height: 400px;
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: scale(1.03);
        }

        .card-image {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .card-content {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.8));
        }

        .card-title {
            color: var(--yellow);
            font-size: 1.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .card-btn {
            background-color: var(--yellow);
            color: var(--charcoal);
            padding: 10px 25px;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .card-btn:hover {
            background-color: var(--dark-yellow);
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }
            
            h2 {
                font-size: 1.5rem;
            }

            .card-container {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 1.5rem;
            }

            h2 {
                font-size: 1.2rem;
            }

            .card {
                height: 300px;
            }

            .card-title {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
